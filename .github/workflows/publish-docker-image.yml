name: Publish Docker image

on:
  release:
    types: [published]

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: hb1964/musicip-wine-1.9.b
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Push README to Docker Hub
        uses: christian-korneck/update-container-description-action@v0.5.1
        with:
          vendor: Docker
          destination_container_repo: hb1964/musicip-wine-1.9.b
          provider_registry_username: ${{ secrets.DOCKER_USERNAME }}
          provider_registry_password: ${{ secrets.DOCKER_PASSWORD }}
          short_description: "Docker image for running MusicIP MusicMagic Windows 1.9.b under Wine"
          readme_file: README.md

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/hb1964/musicip-wine-1.9.b
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
